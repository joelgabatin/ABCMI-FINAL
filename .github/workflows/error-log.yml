name: Error Log

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-check:
    name: Build & Lint Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint 2>&1 | tee lint-errors.log; exit ${PIPESTATUS[0]}
        continue-on-error: true

      - name: Run build
        run: npm run build 2>&1 | tee build-errors.log; exit ${PIPESTATUS[0]}
        continue-on-error: true
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Combine error logs
        if: always()
        run: |
          echo "=============================" > errors.log
          echo "  ABCMI Error Log" >> errors.log
          echo "  Run: #${{ github.run_number }}" >> errors.log
          echo "  Branch: ${{ github.ref_name }}" >> errors.log
          echo "  Commit: ${{ github.sha }}" >> errors.log
          echo "  Date: $(date -u)" >> errors.log
          echo "=============================" >> errors.log
          echo "" >> errors.log
          echo "=== LINT ERRORS ===" >> errors.log
          cat lint-errors.log >> errors.log
          echo "" >> errors.log
          echo "=== BUILD ERRORS ===" >> errors.log
          cat build-errors.log >> errors.log

      - name: Upload error log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: errors-log-run-${{ github.run_number }}
          path: errors.log
          retention-days: 14
